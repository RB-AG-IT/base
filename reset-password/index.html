<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>Passwort festlegen</title>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0a0a;
            --bg-card: #1e1e1e;
            --bg-elevated: #252525;
            --accent-primary: #d97706;
            --accent-secondary: #92400e;
            --accent-gradient: linear-gradient(135deg, #d97706 0%, #92400e 100%);
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-tertiary: #707070;
            --text-disabled: #505050;
            --border-color: #2a2a2a;
            --danger: #ff5252;
            --success: #00e676;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-container {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            width: 100%;
            max-width: 420px;
            padding: 32px;
            border: 1px solid var(--border-color);
        }

        .reset-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .reset-header h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .reset-header p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .form-input::placeholder {
            color: var(--text-disabled);
        }

        .btn-primary {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            margin-top: 8px;
        }

        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .error-msg {
            background: rgba(255, 82, 82, 0.15);
            color: var(--danger);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 82, 82, 0.3);
            display: none;
        }

        .success-msg {
            background: rgba(0, 230, 118, 0.12);
            color: var(--success);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            margin-bottom: 16px;
            border: 1px solid rgba(0, 230, 118, 0.25);
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover { text-decoration: underline; }

        /* Zustand: Warten auf Session */
        .state-waiting .reset-form { display: none; }
        .state-waiting .waiting-msg { display: block; }
        .state-waiting .success-view { display: none; }

        /* Zustand: Formular */
        .state-form .reset-form { display: block; }
        .state-form .waiting-msg { display: none; }
        .state-form .success-view { display: none; }

        /* Zustand: Erfolg */
        .state-success .reset-form { display: none; }
        .state-success .waiting-msg { display: none; }
        .state-success .success-view { display: block; }

        .waiting-msg {
            text-align: center;
            padding: 20px 0;
            color: var(--text-secondary);
            font-size: 14px;
            display: none;
        }

        .waiting-msg .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .success-view {
            text-align: center;
            padding: 20px 0;
            display: none;
        }

        .success-view .checkmark {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(0, 230, 118, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .success-view .checkmark svg {
            width: 28px;
            height: 28px;
            stroke: var(--success);
        }

        .success-view h2 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .success-view p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="reset-container state-waiting" id="resetContainer">
        <div class="reset-header">
            <h1>Neues Passwort vergeben</h1>
            <p>Gib dein neues Passwort ein.</p>
        </div>

        <!-- Warten auf Recovery-Session -->
        <div class="waiting-msg">
            <div class="spinner"></div>
            <p>Session wird geladen...</p>
        </div>

        <!-- Passwort-Formular -->
        <div class="reset-form">
            <div class="error-msg" id="errorMsg"></div>
            <form id="resetForm">
                <div class="form-group">
                    <label class="form-label" for="newPassword">Neues Passwort</label>
                    <input type="password" class="form-input" id="newPassword" placeholder="Mindestens 6 Zeichen" required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Passwort bestaetigen</label>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="Passwort wiederholen" required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary" id="submitBtn">Passwort speichern</button>
            </form>
        </div>

        <!-- Erfolg -->
        <div class="success-view">
            <div class="checkmark">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h2>Passwort geaendert</h2>
            <p>Dein Passwort wurde erfolgreich aktualisiert. Du kannst dich jetzt mit dem neuen Passwort anmelden.</p>
            <a href="/" class="btn-primary" style="text-decoration:none; text-align:center;">Jetzt einloggen!</a>
        </div>

        <a href="/" class="back-link" id="backLink">Zurueck zum Login</a>
    </div>

    <script>
        // ========== SUPABASE SETUP ==========
        const SUPABASE_URL = 'https://lgztglycqtiwcmiydxnm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnenRnbHljcXRpd2NtaXlkeG5tIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2MzgwNzYxNSwiZXhwIjoyMDc5MzgzNjE1fQ.54kSk9ZSUdQt6LKYWkblqgR6Sjev80W80qkNHYEbPgk';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ========== TYP-ERKENNUNG (Invite vs Recovery) ==========
        const urlParams = new URLSearchParams(window.location.search);
        const isInvite = urlParams.get('type') === 'invite';

        if (isInvite) {
            document.querySelector('.reset-header h1').textContent = 'Willkommen bei RB Inside';
            document.querySelector('.reset-header p').textContent = 'Lege jetzt dein persoenliches Passwort fest.';
            document.querySelector('.success-view h2').textContent = 'Passwort festgelegt';
            document.querySelector('.success-view p').textContent = 'Dein Passwort wurde festgelegt. Du kannst dich jetzt einloggen.';
            document.title = 'Willkommen — Passwort festlegen';
        }

        // ========== STATE ==========
        const container = document.getElementById('resetContainer');
        const resetForm = document.getElementById('resetForm');
        const errorMsg = document.getElementById('errorMsg');
        const submitBtn = document.getElementById('submitBtn');
        const backLink = document.getElementById('backLink');

        let recoveryReady = false;

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        function hideError() {
            errorMsg.style.display = 'none';
        }

        function setState(state) {
            container.className = 'reset-container state-' + state;
            // Im Erfolgs-Zustand den Zurueck-Link ausblenden
            backLink.style.display = state === 'success' ? 'none' : 'block';
        }

        // ========== AUTH STATE LISTENER ==========
        supabaseClient.auth.onAuthStateChange((event, session) => {
            console.log('Auth event:', event);

            if (event === 'PASSWORD_RECOVERY') {
                // Recovery-Token wurde verifiziert, User hat eine gueltige Session
                recoveryReady = true;
                setState('form');
                document.getElementById('newPassword').focus();
            }
        });

        // Fallback: Wenn nach 5 Sekunden kein PASSWORD_RECOVERY Event kam,
        // pruefen ob bereits eine Session existiert (z.B. bei Seiten-Refresh)
        setTimeout(async () => {
            if (recoveryReady) return;

            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                // Es gibt eine aktive Session — Formular anzeigen
                recoveryReady = true;
                setState('form');
                document.getElementById('newPassword').focus();
            } else {
                // Kein Recovery-Token, kein Session — Link ist ungueltig oder abgelaufen
                showError('Der Reset-Link ist ungueltig oder abgelaufen. Bitte fordere einen neuen an.');
                setState('form');
            }
        }, 5000);

        // ========== FORM SUBMIT ==========
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const newPw = document.getElementById('newPassword').value;
            const confirmPw = document.getElementById('confirmPassword').value;

            // Validierung
            if (newPw.length < 6) {
                showError('Das Passwort muss mindestens 6 Zeichen lang sein.');
                return;
            }

            if (newPw !== confirmPw) {
                showError('Die Passwoerter stimmen nicht ueberein.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Wird gespeichert...';

            try {
                const { error } = await supabaseClient.auth.updateUser({
                    password: newPw
                });

                if (error) throw error;

                setState('success');

            } catch (err) {
                console.error('Passwort-Update Fehler:', err);

                if (err.message.includes('same password')) {
                    showError('Das neue Passwort darf nicht mit dem alten identisch sein.');
                } else if (err.message.includes('weak')) {
                    showError('Das Passwort ist zu schwach. Bitte waehle ein staerkeres.');
                } else {
                    showError('Fehler beim Speichern: ' + err.message);
                }
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Passwort speichern';
            }
        });
    </script>
</body>
</html>
